spring:
  application:
    name: logical-control-backend
  datasource:
    url: jdbc:as400://dbtest.db.gtk/LOGICALC
    username: ${LOGICALC_DB_USERNAME:etranzitt}
    password: ${LOGICALC_DB_PASSWORD:etr@nzit}
    driver-class-name: com.ibm.as400.access.AS400JDBCDriver
    hikari:
      pool-name: logicalc-main
      auto-commit: true
      connection-test-query: select current_timestamp cts from sysibm.sysdummy1
      keepalive-time: 240000
      connection-timeout: 30000
      validation-timeout: 5000
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 500000
      max-lifetime: 600000
  threads:
    virtual:
      enabled: true
  jpa:
    database-platform: org.hibernate.community.dialect.DB2iLegacyDialect
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: LOGICALC
        format_sql: true
        use_nationalized_character_data: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: false
    locations: classpath:db/migration
  jackson:
    time-zone: Asia/Tashkent

server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: ${SERVER_PORT:8070}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    issuer: logical-control
    secret: logical-control-super-secure-jwt-secret-key-2026-change-me
    access-token-expiration-minutes: 720
  sql-runner:
    enabled: true
    max-result-rows: 1000
    query-timeout-seconds: 120
    history-ttl-minutes: 15
    etranzit:
      allowed-server-name: etran.db.gtk
      jdbc-url: jdbc:as400://etran.db.gtk/ETRANZIT
      username: ${ETRANZIT_DB_USERNAME:etranzits}
      password: ${ETRANZIT_DB_PASSWORD:nB4EaEtU}
      driver-class-name: com.ibm.as400.access.AS400JDBCDriver
  classifier-table-sync:
    enabled: true
    run-on-startup: true
    initial-delay-ms: 21600000
    fixed-delay-ms: 21600000
    schema-name: ETRANZIT
  cors:
    allowed-origins:
      - http://localhost
      - http://127.0.0.1
      - http://192.168.224.241
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://192.168.224.241:5173
